services:
  backend:
    build: .
    image: haohao112/ai_study_platform_backend:dev
    command: sh -c "alembic upgrade head && python run.py"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://coach:coach@postgres:5432/ai_study_platform_db
      REDIS_URL: redis://redis:6379/3
      CELERY_BROKER_URL: redis://redis:6379/4
      CELERY_RESULT_BACKEND: redis://redis:6379/5
      COACH_DATA_DIR: /app/data
      COACH_LLM_API_KEY: ${COACH_LLM_API_KEY:-}
      COACH_LLM_BASE_URL: ${COACH_LLM_BASE_URL:-https://api.deepseek.com}
      COACH_LLM_MODEL: ${COACH_LLM_MODEL:-deepseek-chat}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - coach_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    image: ai_study_platform_backend:dev
    command: sh -c "alembic upgrade head && celery -A app.celery_app.celery_app worker --loglevel=info"
    environment:
      DATABASE_URL: postgresql://coach:coach@postgres:5432/ai_study_platform_db
      REDIS_URL: redis://redis:6379/3
      CELERY_BROKER_URL: redis://redis:6379/4
      CELERY_RESULT_BACKEND: redis://redis:6379/5
      COACH_DATA_DIR: /app/data
      COACH_LLM_API_KEY: ${COACH_LLM_API_KEY:-}
      COACH_LLM_BASE_URL: ${COACH_LLM_BASE_URL:-https://api.deepseek.com}
      COACH_LLM_MODEL: ${COACH_LLM_MODEL:-deepseek-chat}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - coach_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend/vue
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8000
    volumes:
      - .:/app
      - vue_node_modules:/app/frontend/vue/node_modules
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
      POSTGRES_DB: ai_study_platform_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d ai_study_platform_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  coach_data:
  postgres_data:
  redis_data:
  vue_node_modules:
