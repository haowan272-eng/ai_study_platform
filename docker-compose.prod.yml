services:
  backend:
    build: .
    image: learning-coach-backend:prod
    restart: always
    command: sh -c "alembic upgrade head && python run.py"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      APP_ENV: production
      COACH_DATA_DIR: /app/data
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY:?REFRESH_SECRET_KEY is required}
      COACH_LLM_API_KEY: ${COACH_LLM_API_KEY:?COACH_LLM_API_KEY is required}
      COACH_LLM_BASE_URL: ${COACH_LLM_BASE_URL:-https://api.deepseek.com}
      COACH_LLM_MODEL: ${COACH_LLM_MODEL:-deepseek-chat}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - coach_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    image: learning-coach-backend:prod
    restart: always
    command: sh -c "alembic upgrade head && celery -A app.celery_app.celery_app worker --loglevel=info"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      APP_ENV: production
      COACH_DATA_DIR: /app/data
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY:?REFRESH_SECRET_KEY is required}
      COACH_LLM_API_KEY: ${COACH_LLM_API_KEY:?COACH_LLM_API_KEY is required}
      COACH_LLM_BASE_URL: ${COACH_LLM_BASE_URL:-https://api.deepseek.com}
      COACH_LLM_MODEL: ${COACH_LLM_MODEL:-deepseek-chat}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - coach_data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/vue
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    image: learning-coach-frontend:prod
    restart: always
    ports:
      - "4173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  coach_data:
  redis_data:
